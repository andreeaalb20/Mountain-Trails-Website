{% extends "base.tpl.html" %}

{% block content %}
<div class="container mt-4">
    <h2><i class="fas fa-user-cog"></i> Account Settings</h2>
    <hr>

    <div class="row">
        <!-- Sectiunea Profil -->
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">Update Profile</div>
                <div class="card-body">
                    <form action="update_profile.php" method="POST" enctype="multipart/form-data">
                        <div class="form-group">
                            <label>Description</label>
                            <textarea name="description" class="form-control" rows="3">{{ user_description }}</textarea>
                        </div>
                        <div class="form-group">
                            <label>Change Profile Photo</label>
                            <input type="file" name="user_image" class="form-control-file">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Sectiunea Parola -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-dark text-white">Security</div>
                <div class="card-body">
                    <p>To change your password, click the button below:</p>
                    <a href="reset_password_form.php" class="btn btn-outline-danger btn-block">Reset Password</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
