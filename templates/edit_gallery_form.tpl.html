{% extends "base.tpl.html" %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-info text-white">
            <h3 class="mb-0"><i class="fas fa-edit"></i> Edit Trail: {{ trail.title }}</h3>
        </div>
        <div class="card-body">
            <form action="update_gallery.php" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="id" value="{{ trail.id }}">
                
                <div class="form-group">
                    <label class="font-weight-bold">Trail Title</label>
                    <input type="text" name="title" class="form-control" value="{{ trail.title }}" required>
                </div>

                <div class="form-group">
                    <label class="font-weight-bold">Short Description</label>
                    <input type="text" name="title_description" class="form-control" value="{{ trail.title_description }}" required>
                </div>

                <div class="form-group">
                    <label class="font-weight-bold">Full Story</label>
                    <textarea name="long_description" class="form-control" rows="6" required>{{ trail.long_description }}</textarea>
                </div>

                <!-- Secțiune nouă pentru Poza de Copertă -->
                <div class="form-group">
                    <label class="font-weight-bold">Update Cover Photo (Optional)</label>
                    <div class="mb-2">
                        <small class="text-muted">Current photo: {{ trail.img }}</small><br>
                        <img src="templates/pictures/{{ trail.img }}" class="img-thumbnail" style="height: 100px;">
                    </div>
                    <div class="custom-file">
                        <input type="file" name="img" class="custom-file-input" id="trailImage">
                        <label class="custom-file-label" for="trailImage">Choose new image to replace current one...</label>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-info text-white">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                    <a href="manage_galleries.php" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Scriptul pentru a vedea numele fișierului selectat
    $('.custom-file-input').on('change', function() {
        let fileName = $(this).val().split('\\').pop();
        $(this).next('.custom-file-label').addClass("selected").html(fileName);
    });
</script>
{% endblock %}
