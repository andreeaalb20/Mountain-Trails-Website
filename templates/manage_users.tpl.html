{% extends "base.tpl.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-users-cog"></i> User Management</h2>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="thead-dark">
                    <tr>
                        <th>Avatar</th>
                        <th>Username</th>
                        <th>User ID</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td style="vertical-align: middle;">
                            <img src="templates/pictures/users/{{ user.user_image }}" 
                                 style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid #ddd;">
                        </td>
                        <td style="vertical-align: middle;">
                            <strong>{{ user.user }}</strong>
                        </td>
                        <td style="vertical-align: middle;">
                            <span class="badge badge-secondary">#{{ user.id }}</span>
                        </td>
                        <td class="text-right" style="vertical-align: middle;">
                            <a href="delete_user.php?id={{ user.id }}" 
                               class="btn btn-danger btn-sm" 
                               onclick="return confirm('WARNING: This will permanently delete user {{ user.user }} and all their galleries/comments. Proceed?')">
                               <i class="fas fa-user-times"></i> Delete User
                            </a>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center text-muted">No other users registered yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
