{% extends "base.tpl.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Change Account Password</h4>
                </div>
                <div class="card-body">
                    <form action="do_reset_password.php" method="POST">
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
                        </div>
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <input type="password" name="confirm_password" class="form-control" placeholder="Repeat new password" required>
                        </div>
                        
                        {% if app.request.get('error') == 'mismatch' %}
                            <div class="alert alert-danger">Passwords do not match!</div>
                        {% endif %}

                        <button type="submit" class="btn btn-danger btn-block">Update Password</button>
                        <a href="settings.php" class="btn btn-link btn-block">Back to Settings</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
